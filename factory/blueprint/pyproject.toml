[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "nyxnight"
version = "0.1.0"
description = "Standalone deterministic night-out planner generated by a Google ADK workflow"
requires-python = ">=3.12"
dependencies = [
  "fastapi>=0.116,<1",
  "pydantic>=2.11,<3",
  "uvicorn>=0.35,<1",
]

[project.optional-dependencies]
dev = [
  "build>=1.2",
  "httpx>=0.28",
  "mypy>=1.17",
  "pytest>=8.4",
  "ruff>=0.12",
]

[project.scripts]
nyxnight = "nyxnight.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["nyxnight"]

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.12"
strict = true

[tool.pytest.ini_options]
testpaths = ["tests"]
